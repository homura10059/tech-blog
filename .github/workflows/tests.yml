name: tests

on:
  push:
    branches:
      - main
  pull_request:
    types: [ opened, reopened ]

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v2
      - uses: pnpm/action-setup@v4
      - name: install deps
        run: pnpm install
      - name: run test
        run: pnpm test